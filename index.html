<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Specifications CQ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');
:root{--bg:#0f0f11;--s1:#17171a;--s2:#1f1f23;--b:#2a2a30;--b2:#36363e;--acc:#c8a96e;--acc2:#e8c98e;--t:#e8e6e0;--t2:#9e9b92;--t3:#5c5a55;--ok:#5a9e6f;--ko:#e05a4e;--info:#4e8ec8;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--t);font-size:13px}
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:192px;min-width:192px;background:var(--s1);border-right:1px solid var(--b);display:flex;flex-direction:column;padding:16px 0}
.logo{padding:0 14px 16px;border-bottom:1px solid var(--b);margin-bottom:8px}
.logo-t{font-family:var(--mono);font-size:11px;font-weight:500;color:var(--acc);letter-spacing:.08em;text-transform:uppercase}
.logo-s{font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:2px}
.nav{flex:1;padding:0 6px}
.ni{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:5px;cursor:pointer;color:var(--t2);font-size:12px;transition:all .12s;margin-bottom:2px;user-select:none}
.ni:hover{background:var(--s2);color:var(--t)}
.ni.active{background:rgba(200,169,110,.12);color:var(--acc2);font-weight:500}
.nb{margin-left:auto;background:var(--b2);color:var(--t3);font-family:var(--mono);font-size:9px;padding:1px 5px;border-radius:99px}
.ni.active .nb{background:rgba(200,169,110,.2);color:var(--acc)}
.sf{padding:10px 14px 0;border-top:1px solid var(--b);font-size:9px;color:var(--t3);font-family:var(--mono)}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{height:48px;background:var(--s1);border-bottom:1px solid var(--b);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.sw{position:relative;flex:1;max-width:280px}
.sw input{width:100%;background:var(--s2);border:1px solid var(--b);border-radius:5px;color:var(--t);font-family:var(--sans);font-size:12px;padding:5px 9px 5px 25px;outline:none;transition:border-color .12s}
.sw input:focus{border-color:var(--acc)}
.sw input::placeholder{color:var(--t3)}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--t3);font-size:11px;pointer-events:none}
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:5px;font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;border:none;transition:all .12s}
.btn-p{background:var(--acc);color:#1a1508}.btn-p:hover{background:var(--acc2)}
.btn-s{background:var(--s2);color:var(--t2);border:1px solid var(--b2)}.btn-s:hover{color:var(--t);background:var(--b)}
.btn-sm{padding:3px 8px;font-size:10px}
.cr{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--t3)}
.content{flex:1;overflow-y:auto;padding:12px 16px}
.page{display:none}.page.active{display:block}
.prog-block{background:var(--s1);border:1px solid var(--b);border-radius:7px;margin-bottom:12px;overflow:hidden}
.prog-title{background:var(--s2);border-bottom:1px solid var(--b);padding:7px 12px;display:flex;align-items:center;gap:9px}
.prog-id{font-family:var(--mono);font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.06em}
.prog-cal{font-size:14px;font-weight:600;flex:1}
.pill{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:99px;border:1px solid var(--b);background:var(--s2);color:var(--t2);white-space:nowrap}
.pill.rm{color:var(--info);border-color:rgba(78,142,200,.25);background:rgba(78,142,200,.08)}
.pill.fr{color:var(--ok);border-color:rgba(90,158,111,.25);background:rgba(90,158,111,.08)}
.pill.an{color:var(--acc);border-color:rgba(200,169,110,.25);background:rgba(200,169,110,.08)}
.prog-body{display:grid;grid-template-columns:220px 1fr}
.col-left{border-right:1px solid var(--b)}
.cl-hdr{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--b)}
.cl-hdr div{padding:4px 8px;font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;font-family:var(--mono)}
.cl-hdr div:first-child{border-right:1px solid var(--b)}
.cl-row{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--b)}
.cl-row:last-child{border-bottom:none}
.cl-l{padding:4px 8px;font-size:10px;color:var(--t2);border-right:1px solid var(--b);line-height:1.4}
.cl-v{padding:4px 8px;font-size:10px;color:var(--t);font-family:var(--mono);line-height:1.4;word-break:break-word}
.col-right{overflow-x:auto}
.ct{width:100%;border-collapse:collapse;font-family:var(--mono);font-size:11px}
.ct th{padding:4px 7px;background:rgba(200,169,110,.05);color:var(--acc);font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--b);border-right:1px solid var(--b);text-align:center;white-space:nowrap}
.ct th.th-l{text-align:left;min-width:80px}
.ct th:last-child{border-right:none}
.ct td{padding:4px 7px;border-bottom:1px solid var(--b);border-right:1px solid var(--b);text-align:center;vertical-align:middle;color:var(--t2)}
.ct td.td-pos{text-align:left;color:var(--t3);font-size:10px;font-weight:500;background:rgba(200,169,110,.025);white-space:nowrap;padding-left:10px}
.ct td:last-child{border-right:none}
.ct tr:last-child td{border-bottom:none}
.ct tr:hover td{background:rgba(255,255,255,.018)}
.ct .tr-sec td{background:rgba(200,169,110,.04);color:var(--t3);font-size:9px;text-transform:uppercase;letter-spacing:.04em;padding:3px 7px;border-bottom:1px solid var(--b)}
.hatch{background:repeating-linear-gradient(45deg,rgba(255,255,255,.025),rgba(255,255,255,.025) 2px,transparent 2px,transparent 7px);color:var(--t3)}
.cv{display:flex;flex-direction:column;align-items:center;gap:1px}
.cv-v{color:var(--t);font-size:11px}
.cv-s{color:var(--t3);font-size:9px}
.prog-foot{display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border-top:1px solid var(--b);background:var(--s2)}
.prog-date{font-size:10px;font-family:var(--mono);color:var(--t3)}
.prog-date span{color:var(--t2)}
.htbl{width:100%;border-collapse:collapse;font-size:12px}
.htbl th{text-align:left;padding:6px 9px;font-size:9px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--b);font-family:var(--mono)}
.htbl td{padding:6px 9px;border-bottom:1px solid var(--b);color:var(--t2);vertical-align:top}
.htbl tr:hover td{background:var(--s2)}
.ht{font-size:9px;padding:2px 6px;border-radius:99px;font-family:var(--mono);font-weight:500}
.ht.modif{background:rgba(78,142,200,.12);color:var(--info)}
.ht.ajout{background:rgba(90,158,111,.12);color:var(--ok)}
.dc{background:var(--s1);border:1px solid var(--b);border-radius:7px;margin-bottom:8px;overflow:hidden}
.dh{display:flex;align-items:center;gap:9px;padding:8px 12px;background:var(--s2);border-bottom:1px solid var(--b);cursor:pointer;user-select:none}
.dcal{font-weight:500;font-size:13px;flex:1}
.dbdg{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:99px}
.dbdg.diff{background:rgba(224,90,78,.12);color:var(--ko)}
.dbdg.ok{background:rgba(90,158,111,.12);color:var(--ok)}
.dbdg.part{background:rgba(200,169,110,.12);color:var(--acc)}
.dbody{display:none}.dbody.open{display:block}
.drow{display:grid;grid-template-columns:150px 1fr 1fr;border-bottom:1px solid var(--b);font-size:11px;font-family:var(--mono)}
.drow:last-child{border-bottom:none}
.drow>div{padding:5px 9px}
.dfld{color:var(--t3);font-size:10px;display:flex;align-items:center}
.dv{color:var(--t2)}.dv.c1{color:var(--ko);background:rgba(224,90,78,.05)}.dv.c2{color:var(--ok);background:rgba(90,158,111,.05)}
.dch{background:var(--s2);font-size:9px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.05em}
.empty{text-align:center;padding:56px 24px;color:var(--t3)}
.ei{font-size:32px;margin-bottom:10px;opacity:.3}
.et2{font-size:13px;font-weight:500;color:var(--t2);margin-bottom:4px}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.mo.open{display:flex}
.md{background:var(--s1);border:1px solid var(--b2);border-radius:9px;padding:20px;width:560px;max-width:96vw;max-height:92vh;overflow-y:auto}
.md-lg{width:660px}
.mt{font-size:14px;font-weight:600;margin-bottom:3px}
.ms{font-size:10px;color:var(--t3);margin-bottom:14px}
.fg{margin-bottom:10px}
.fl{display:block;font-size:10px;font-weight:500;color:var(--t2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.fi,.fa,.fs{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:5px;color:var(--t);font-family:var(--sans);font-size:12px;padding:6px 9px;outline:none;transition:border-color .12s}
.fi:focus,.fa:focus,.fs:focus{border-color:var(--acc)}
.fa{resize:vertical;min-height:50px}
.fs option{background:var(--s2)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px}
.full{grid-column:1/-1}
.sep{border-top:1px solid var(--b);margin:12px 0;padding-top:12px}
.sep-l{font-size:10px;font-weight:500;color:var(--acc);text-transform:uppercase;letter-spacing:.05em;margin-bottom:9px}
.ma{display:flex;gap:7px;justify-content:flex-end;margin-top:16px}
.tw{position:fixed;bottom:14px;right:14px;z-index:200;display:flex;flex-direction:column;gap:5px}
.toast{background:var(--s2);border:1px solid var(--b2);border-radius:5px;padding:8px 12px;font-size:11px;color:var(--t);min-width:200px;animation:si .15s ease;display:flex;align-items:center;gap:6px}
.toast.s{border-left:3px solid var(--ok)}.toast.e{border-left:3px solid var(--ko)}
@keyframes si{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
</style>
</head>
<body>
<div class="shell">
<nav class="sidebar">
  <div class="logo"><div class="logo-t">Specifications</div><div class="logo-s">Programmes chronometrie</div></div>
  <div class="nav">
    <div class="ni active" onclick="nav('mvt')"><span>&#9881;</span>Mouvements<span class="nb" id="b-mvt">0</span></div>
    <div class="ni" onclick="nav('hd')"><span>&#9672;</span>Heads<span class="nb" id="b-hd">0</span></div>
    <div class="ni" onclick="nav('hist')"><span>&#9719;</span>Historique<span class="nb" id="b-hist">0</span></div>
    <div class="ni" onclick="nav('diff')"><span>&#8644;</span>Comparaison<span class="nb" id="b-diff">0</span></div>
  </div>
  <div class="sf">&#9679; Mode local</div>
</nav>
<div class="main">
  <div class="topbar">
    <div class="sw"><span class="si">&#9901;</span><input type="text" id="srch" placeholder="Rechercher calibre, programme..." oninput="onSearch()"></div>
    <button class="btn btn-p" onclick="openAdd()">+ Ajouter</button>
    <span class="cr" id="cr"></span>
  </div>
  <div class="content">
    <div class="page active" id="page-mvt">
      <div id="list-mvt"></div>
      <div class="empty" id="e-mvt" style="display:none"><div class="ei">&#9881;</div><div class="et2">Aucun programme</div></div>
    </div>
    <div class="page" id="page-hd">
      <div id="list-hd"></div>
      <div class="empty" id="e-hd" style="display:none"><div class="ei">&#9672;</div><div class="et2">Aucun programme</div></div>
    </div>
    <div class="page" id="page-hist">
      <table class="htbl"><thead><tr><th>Date</th><th>Type</th><th>Programme</th><th>Calibre</th><th>Operateur</th><th>Motif</th></tr></thead><tbody id="hbody"></tbody></table>
      <div class="empty" id="e-hist" style="display:none"><div class="ei">&#9719;</div><div class="et2">Aucune modification</div></div>
    </div>
    <div class="page" id="page-diff">
      <div id="dcont"></div>
      <div class="empty" id="e-diff"><div class="ei">&#8644;</div><div class="et2">Pas de donnees</div></div>
    </div>
  </div>
</div>
</div>
<!-- MODAL MODIFIER -->
<div class="mo" id="mo-edit">
  <div class="md md-lg">
    <div class="mt" id="et"></div><div class="ms" id="es"></div>
    <input type="hidden" id="eu"><input type="hidden" id="etype">
    <div class="fg2">
      <div class="fg full"><label class="fl">Calibre *</label><input class="fi" id="ec"></div>
      <div class="fg"><label class="fl">Reserve de marche</label><input class="fi" id="erm"></div>
      <div class="fg"><label class="fl">Alternances/h</label><input class="fi" id="efreq"></div>
      <div class="fg"><label class="fl">Angle de levee</label><input class="fi" id="eangle"></div>
      <div class="fg"><label class="fl">Gain</label><input class="fi" id="egain"></div>
      <div class="fg full"><label class="fl">Remontage tige</label><textarea class="fa" id="ert"></textarea></div>
      <div class="fg full"><label class="fl">Remontage auto</label><textarea class="fa" id="era"></textarea></div>
      <div class="fg"><label class="fl">Stab. post-remontage</label><input class="fi" id="esp"></div>
      <div class="fg"><label class="fl">Stab. inter-mesure</label><input class="fi" id="esi"></div>
      <div class="fg"><label class="fl">Temps de mesure</label><input class="fi" id="etm"></div>
      <div class="fg"><label class="fl">Isochr. repere</label><input class="fi" id="eiso"></div>
    </div>
    <div class="sep"><div class="sep-l">Tracabilite obligatoire</div>
    <div class="fg2">
      <div class="fg"><label class="fl">Operateur *</label><input class="fi" id="eop" autocomplete="name"></div>
      <div class="fg"><label class="fl">Champ(s) modifie(s)</label><input class="fi" id="echamp"></div>
      <div class="fg full"><label class="fl">Motif *</label><textarea class="fa" id="emotif"></textarea></div>
    </div></div>
    <div class="ma"><button class="btn btn-s" onclick="closeMo('mo-edit')">Annuler</button><button class="btn btn-p" onclick="saveEdit()">Enregistrer et archiver</button></div>
  </div>
</div>
<!-- MODAL AJOUTER -->
<div class="mo" id="mo-add">
  <div class="md md-lg">
    <div class="mt">Ajouter un programme</div><div class="ms">Nouveau programme.</div>
    <div class="fg2">
      <div class="fg"><label class="fl">Type *</label><select class="fs" id="at"><option value="mvt">Mouvement</option><option value="head">Head</option></select></div>
      <div class="fg"><label class="fl">ID *</label><input class="fi" id="aid"></div>
      <div class="fg full"><label class="fl">Calibre *</label><input class="fi" id="acal"></div>
      <div class="fg"><label class="fl">Reserve de marche</label><input class="fi" id="arm"></div>
      <div class="fg"><label class="fl">Alternances/h</label><input class="fi" id="afreq"></div>
      <div class="fg"><label class="fl">Angle de levee</label><input class="fi" id="aangle"></div>
      <div class="fg"><label class="fl">Gain</label><input class="fi" id="again"></div>
      <div class="fg full"><label class="fl">Remontage tige</label><textarea class="fa" id="art"></textarea></div>
      <div class="fg full"><label class="fl">Remontage auto</label><textarea class="fa" id="ara"></textarea></div>
      <div class="fg"><label class="fl">Stab. post-remontage</label><input class="fi" id="asp"></div>
      <div class="fg"><label class="fl">Stab. inter-mesure</label><input class="fi" id="asi"></div>
      <div class="fg"><label class="fl">Temps de mesure</label><input class="fi" id="atm"></div>
      <div class="fg"><label class="fl">Isochr. repere</label><input class="fi" id="aiso"></div>
    </div>
    <div class="sep"><div class="sep-l">Tracabilite</div>
    <div class="fg"><label class="fl">Operateur *</label><input class="fi" id="aop" autocomplete="name"></div></div>
    <div class="ma"><button class="btn btn-s" onclick="closeMo('mo-add')">Annuler</button><button class="btn btn-p" onclick="saveAdd()">Creer</button></div>
  </div>
</div>
<div class="tw" id="tw"></div>

var POS_ORDER = ['CH','CB','9H','6H','3H'];
var POS_LABEL = {'CH':'HH - CH','CB':'HB - CB','9H':'VB - 9H','6H':'VG - 6H','3H':'VH - 3H'};
var S = {mvt:[],hd:[],hist:[],q:'',page:'mvt'};

function nav(p) {
  S.page=p;
  var pages=document.querySelectorAll('.page');
  var nis=document.querySelectorAll('.ni');
  for(var i=0;i<pages.length;i++) pages[i].classList.remove('active');
  for(var i=0;i<nis.length;i++) nis[i].classList.remove('active');
  document.getElementById('page-'+p).classList.add('active');
  var idx=['mvt','hd','hist','diff'].indexOf(p);
  if(idx>=0) nis[idx].classList.add('active');
  document.getElementById('srch').value=''; S.q='';
  render();
}
function onSearch(){S.q=document.getElementById('srch').value.toLowerCase();render();}
function render(){
  if(S.page==='mvt') renderList('mvt');
  else if(S.page==='hd') renderList('hd');
  else if(S.page==='hist') renderHist();
  else if(S.page==='diff') renderDiff();
}
function tsNow(){return new Date().toLocaleString('fr-CH',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});}
function genUid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function gv(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function toast(msg,t){
  t=t||'s';
  var w=document.getElementById('tw'),d=document.createElement('div');
  d.className='toast '+t; d.textContent=msg; w.appendChild(d);
  setTimeout(function(){d.remove();},3500);
}

function renderList(type) {
  var items = type==='mvt' ? S.mvt : S.hd;
  var q = S.q;
  var filtered = q ? items.filter(function(p){return (p.id+p.calibre).toLowerCase().indexOf(q)>=0;}) : items;
  var list = document.getElementById('list-'+type);
  var emp  = document.getElementById('e-'+type);
  document.getElementById('b-'+type).textContent = items.length;
  document.getElementById('cr').textContent = filtered.length+' programme(s)';
  if(!filtered.length){list.innerHTML='';emp.style.display='block';return;}
  emp.style.display='none';
  var html='';
  for(var i=0;i<filtered.length;i++) html+=buildBlock(filtered[i],type);
  list.innerHTML=html;
}

function buildBlock(p,type) {
  var T0=p.T0||{}, T24=p.T24||{};

  // Cellule Marche min/max (s/j)
  function marcheCell(tObj,pk) {
    var d=tObj[pk];
    if(!d||d.rate_min===null&&d.rate_max===null) return '<td class="hatch"></td>';
    if(d.rate_min!==null&&d.rate_max!==null) return '<td class="cv-v">'+d.rate_min+' / '+d.rate_max+'</td>';
    if(d.rate_min!==null) return '<td class="cv-v">&ge;'+d.rate_min+'</td>';
    return '<td class="cv-v">&le;'+d.rate_max+'</td>';
  }

  // Cellule Amplitude min/max (°)
  function ampliCell(tObj,pk) {
    var d=tObj[pk];
    if(!d||d.amp_min===null&&d.amp_max===null) return '<td class="hatch"></td>';
    if(d.amp_min!==null&&d.amp_max!==null) return '<td class="cv-v">'+d.amp_min+' / '+d.amp_max+'&deg;</td>';
    if(d.amp_min!==null) return '<td class="cv-v">&ge;'+d.amp_min+'&deg;</td>';
    return '<td class="cv-v">&le;'+d.amp_max+'&deg;</td>';
  }

  // Cellule Repère (beat)
  function repereCell(tObj,pk) {
    var d=tObj[pk];
    if(!d||d.beat===null) return '<td class="hatch"></td>';
    return '<td class="cv-v">&plusmn;'+d.beat+'</td>';
  }

  // Ligne a-t-elle des données (marche OU ampli) ?
  function hasData(d) {
    if(!d) return false;
    return d.rate_min!==null||d.rate_max!==null||d.amp_min!==null||d.amp_max!==null;
  }

  function clRow(lbl,val) {
    if(!val) return '';
    return '<div class="cl-row"><div class="cl-l">'+esc(lbl)+'</div><div class="cl-v">'+esc(val)+'</div></div>';
  }

  var l0=esc(p.label0h||'0h');
  var l24=esc(p.label24h||'24h');

  var POS_LABELS={'CH':'HH &mdash; CH','CB':'HB &mdash; CB','9H':'VB &mdash; 9H','6H':'VG &mdash; 6H','3H':'VH &mdash; 3H'};
  var posRows='';
  for(var i=0;i<POS_ORDER.length;i++){
    var pk=POS_ORDER[i];
    var d0=T0[pk], d24=T24[pk];
    if(!hasData(d0)&&!hasData(d24)) continue;
    posRows+='<tr>'+
      '<td class="td-pos">'+POS_LABELS[pk]+'</td>'+
      marcheCell(T0,pk)+ampliCell(T0,pk)+repereCell(T0,pk)+
      marcheCell(T24,pk)+ampliCell(T24,pk)+repereCell(T24,pk)+
    '</tr>';
  }

  // Moyenne
  var moyRows='';
  var dm0=T0['MOY'], dm24=T24['MOY'];
  if(hasData(dm0)||hasData(dm24)){
    moyRows='<tr class="tr-sec"><td colspan="7">Moyenne</td></tr>'+
      '<tr><td class="td-pos">Moy.</td>'+
        marcheCell(T0,'MOY')+ampliCell(T0,'MOY')+'<td class="hatch"></td>'+
        marcheCell(T24,'MOY')+ampliCell(T24,'MOY')+'<td class="hatch"></td>'+
      '</tr>';
  }

  // Delta
  var deltaRows='';
  var dd0=T0['DELTA'], dd24=T24['DELTA'];
  if((dd0&&dd0.rate_min!==null)||(dd24&&dd24.rate_min!==null)){
    function dCell(d){
      if(!d||d.rate_min===null) return '<td class="hatch"></td>';
      return '<td class="cv-v">&le;'+d.rate_min+'</td>';
    }
    function daCell(d){
      if(!d||d.amp_min===null) return '<td class="hatch"></td>';
      return '<td class="cv-v">&ge;'+d.amp_min+'&deg;</td>';
    }
    deltaRows='<tr class="tr-sec"><td colspan="7">Delta isochronisme</td></tr>'+
      '<tr><td class="td-pos">&Delta;</td>'+
        dCell(dd0)+daCell(dd0)+'<td class="hatch"></td>'+
        dCell(dd24)+daCell(dd24)+'<td class="hatch"></td>'+
      '</tr>';
  }

  // Isochr : afficher uniquement s'il y a une valeur
  var isoHeader = p.isochr ? '<th>Isochr.</th>' : '';
  var isoCol    = p.isochr ? '<td class="cv-v" style="text-align:center">'+esc(p.isochr)+'</td>' : '';

  return '<div class="prog-block">'+
    '<div class="prog-title">'+
      '<span class="prog-id">'+esc(p.id)+'</span>'+
      '<span class="prog-cal">'+(p.calibre?esc(p.calibre):'&mdash;')+'</span>'+
      (p.rm    ?'<span class="pill rm">RM '+esc(p.rm)+'</span>':'')+
      (p.freq  ?'<span class="pill fr">'+esc(p.freq)+' a/h</span>':'')+
      (p.angle ?'<span class="pill an">&uarr; '+esc(p.angle)+'</span>':'')+
      (p.gain  ?'<span class="pill">G '+esc(p.gain)+'</span>':'')+
    '</div>'+
    '<div class="prog-body">'+
      '<div class="col-left">'+
        '<div class="cl-hdr"><div>Crit&egrave;res</div><div>Valeurs</div></div>'+
        clRow('Remontage tige',p.remTige)+
        clRow('Remontage auto',p.remAuto)+
        clRow('Stab. post-remontage',p.stabPost)+
        clRow('Temps de mesure',p.tMesure)+
        clRow('Stab. inter-mesure',p.stabInter)+
      '</div>'+
      '<div class="col-right"><table class="ct">'+
        '<thead>'+
          '<tr>'+
            '<th class="th-l"></th>'+
            '<th colspan="3">'+l0+'</th>'+
            '<th colspan="3">'+l24+'</th>'+
            (p.isochr?'<th>Isochr.</th>':'')+
          '</tr>'+
          '<tr>'+
            '<th class="th-l">Position</th>'+
            '<th>Marche (s/j)</th><th>Ampli. (&deg;)</th><th>Rep&egrave;re</th>'+
            '<th>Marche (s/j)</th><th>Ampli. (&deg;)</th><th>Rep&egrave;re</th>'+
            (p.isochr?'<th></th>':'')+
          '</tr>'+
        '</thead>'+
        '<tbody>'+
          // Positions avec isochr sur la ligne HH uniquement
          (function(){
            var rows='';
            for(var i=0;i<POS_ORDER.length;i++){
              var pk=POS_ORDER[i];
              var d0=T0[pk], d24=T24[pk];
              if(!hasData(d0)&&!hasData(d24)) continue;
              rows+='<tr>'+
                '<td class="td-pos">'+POS_LABELS[pk]+'</td>'+
                marcheCell(T0,pk)+ampliCell(T0,pk)+repereCell(T0,pk)+
                marcheCell(T24,pk)+ampliCell(T24,pk)+repereCell(T24,pk)+
                (p.isochr&&pk==='CH'?'<td class="cv-v" style="text-align:center;color:var(--acc)">'+esc(p.isochr)+'</td>':
                 p.isochr?'<td class="hatch"></td>':'')+
              '</tr>';
            }
            return rows;
          })()+
          moyRows+deltaRows+
        '</tbody>'+
      '</table></div>'+
    '</div>'+
    '<div class="prog-foot">'+
      '<span class="prog-date">Modifi&eacute; le <span>'+(p.lastMod?esc(p.lastMod):'&mdash;')+'</span>'+(p.lastOp?' par <span>'+esc(p.lastOp)+'</span>':'')+' </span>'+
      '<button class="btn btn-s btn-sm" onclick="openEdit(\''+p._uid+'\',\''+type+'\')">&#9998; Modifier</button>'+
    '</div>'+
  '</div>';
}


function renderHist() {
  var body=document.getElementById('hbody'), emp=document.getElementById('e-hist');
  var items=S.q?S.hist.filter(function(h){return JSON.stringify(h).toLowerCase().indexOf(S.q)>=0;}):S.hist;
  document.getElementById('b-hist').textContent=S.hist.length;
  document.getElementById('cr').textContent=items.length+' entree(s)';
  if(!items.length){body.innerHTML='';emp.style.display='block';return;}
  emp.style.display='none';
  var h='';
  for(var i=0;i<items.length;i++){
    var e=items[i];
    h+='<tr>'+
      '<td style="font-family:var(--mono);font-size:10px">'+esc(e.date)+'</td>'+
      '<td><span class="ht '+e.type+'">'+esc(e.type)+'</span></td>'+
      '<td style="font-family:var(--mono);font-size:10px">'+esc(e.progId||'-')+'</td>'+
      '<td>'+esc(e.calibre||'-')+'</td>'+
      '<td style="color:var(--t)">'+esc(e.operateur)+'</td>'+
      '<td>'+esc(e.motif)+(e.champ?'<br><span style="font-size:9px;color:var(--t3);font-family:var(--mono)">&rarr; '+esc(e.champ)+'</span>':'')+'</td>'+
    '</tr>';
  }
  body.innerHTML=h;
}

function logHist(e) {
  S.hist.unshift(e); save();
  document.getElementById('b-hist').textContent=S.hist.length;
}

function renderDiff() {
  var c=document.getElementById('dcont'), emp=document.getElementById('e-diff');
  function norm(s){return (s||'').toLowerCase().replace(/[\s\-_\.]+/g,'').replace(/top|elabore|special|premium|upgrade|cosc/gi,'').trim();}
  var map={};
  for(var i=0;i<S.mvt.length;i++){var k=norm(S.mvt[i].calibre);if(k){if(!map[k])map[k]={cal:S.mvt[i].calibre,mvt:null,hd:null};map[k].mvt=S.mvt[i];}}
  for(var i=0;i<S.hd.length;i++){var k=norm(S.hd[i].calibre);if(k){if(!map[k])map[k]={cal:S.hd[i].calibre,mvt:null,hd:null};map[k].hd=S.hd[i];}}
  var entries=Object.values(map);
  document.getElementById('b-diff').textContent=entries.length;
  document.getElementById('cr').textContent=entries.length+' calibre(s)';
  if(!entries.length){c.innerHTML='';emp.style.display='block';return;}
  emp.style.display='none';

  var PLIST=['CH','CB','6H','9H','3H','MOY'];
  var PLBL={'CH':'HH-CH','CB':'HB-CB','6H':'VG-6H','9H':'VB-9H','3H':'VH-3H','MOY':'Moyenne'};

  function fmtR(d){
    if(!d||d.rate_min===null&&d.rate_max===null) return '<span style="color:var(--t3)">—</span>';
    if(d.rate_min!==null&&d.rate_max!==null) return d.rate_min+' / '+d.rate_max+' s/j';
    return d.rate_min!==null?'&ge;'+d.rate_min:'&le;'+d.rate_max;
  }
  function fmtA(d){
    if(!d||d.amp_min===null&&d.amp_max===null) return '<span style="color:var(--t3)">—</span>';
    if(d.amp_min!==null&&d.amp_max!==null) return d.amp_min+' / '+d.amp_max+'&deg;';
    return d.amp_min!==null?'&ge;'+d.amp_min+'&deg;':'&le;'+d.amp_max+'&deg;';
  }
  function same(a,b){return JSON.stringify(a)===JSON.stringify(b);}

  var h='';
  for(var i=0;i<entries.length;i++){
    var en=entries[i], hb=en.mvt&&en.hd, df=0;
    var rows='';

    // Angle de levée
    var mang=(en.mvt?en.mvt.angle:'')||'', hang=(en.hd?en.hd.angle:'')||'';
    var adiff=hb&&mang&&hang&&mang!==hang;
    if(adiff)df++;
    rows+='<div class="drow"><div class="dfld" style="font-weight:500">Angle levée</div>'+
      '<div class="dv '+(adiff?'c1':'')+'">'+esc(mang||'—')+'</div>'+
      '<div class="dv '+(adiff?'c2':'')+'">'+esc(hang||'—')+'</div></div>';

    // Specs par position (T0 et T24)
    for(var ti=0;ti<2;ti++){
      var tk=ti===0?'T0':'T24';
      var tlbl=ti===0?'0h':'24h';
      rows+='<div class="drow" style="background:rgba(200,169,110,.03)"><div class="dfld" style="color:var(--acc);font-size:9px;text-transform:uppercase;letter-spacing:.06em">Condition '+tlbl+'</div><div class="dv" style="font-size:9px;color:var(--t3)">Mouvement nu</div><div class="dv" style="font-size:9px;color:var(--t3)">Head</div></div>';
      for(var pi=0;pi<PLIST.length;pi++){
        var pk=PLIST[pi];
        var mv_d=en.mvt&&en.mvt[tk]?en.mvt[tk][pk]:null;
        var hd_d=en.hd &&en.hd[tk] ?en.hd[tk][pk] :null;
        var hasM=mv_d&&(mv_d.rate_min!==null||mv_d.amp_min!==null);
        var hasH=hd_d&&(hd_d.rate_min!==null||hd_d.amp_min!==null);
        if(!hasM&&!hasH) continue;
        var rdiff=hb&&!same(mv_d?{r:mv_d.rate_min,x:mv_d.rate_max}:null, hd_d?{r:hd_d.rate_min,x:hd_d.rate_max}:null);
        var adiff2=hb&&!same(mv_d?{a:mv_d.amp_min,b:mv_d.amp_max}:null, hd_d?{a:hd_d.amp_min,b:hd_d.amp_max}:null);
        if(rdiff||adiff2)df++;
        rows+='<div class="drow">'+
          '<div class="dfld" style="padding-left:16px">'+PLBL[pk]+
            '<span style="font-size:9px;color:var(--t3);margin-left:6px">marche / ampli.</span></div>'+
          '<div class="dv '+(rdiff||adiff2?'c1':'')+'" style="font-size:10px">'+fmtR(mv_d)+' &nbsp; '+fmtA(mv_d)+'</div>'+
          '<div class="dv '+(rdiff||adiff2?'c2':'')+'" style="font-size:10px">'+fmtR(hd_d)+' &nbsp; '+fmtA(hd_d)+'</div>'+
        '</div>';
      }
    }

    var cls=!hb?'part':df?'diff':'ok';
    var lbl=!hb?(en.mvt?'Head manquant':'Mvt manquant'):df?(df+' diff'):'OK';
    h+='<div class="dc">'+
      '<div class="dh" onclick="tgD('+i+')">'+
        '<span class="dcal">'+esc(en.cal)+'</span>'+
        '<span style="font-size:9px;color:var(--t3);font-family:var(--mono)">'+(en.mvt?esc(en.mvt.id):'-')+' / '+(en.hd?esc(en.hd.id):'-')+'</span>'+
        '<span class="dbdg '+cls+'">'+lbl+'</span>'+
        '<span id="da-'+i+'" style="color:var(--t3)">&#9656;</span>'+
      '</div>'+
      '<div class="dbody" id="db-'+i+'">'+
        '<div class="drow"><div class="dch">Critère</div><div class="dch">Mouvement nu</div><div class="dch">Head</div></div>'+
        rows+
      '</div>'+
    '</div>';
  }
  c.innerHTML=h;
}

function tgD(i) {
  var b=document.getElementById('db-'+i);
  var a=document.getElementById('da-'+i);
  if(!b||!a) return;
  b.classList.toggle('open');
  a.innerHTML = b.classList.contains('open') ? '&#9662;' : '&#9656;';
}


function updateBadges(){
  document.getElementById('b-mvt').textContent=S.mvt.length;
  document.getElementById('b-hd').textContent=S.hd.length;
  document.getElementById('b-hist').textContent=S.hist.length;
}

function closeMo(id){document.getElementById(id).classList.remove('open');}

function openEdit(euid,type){
  var items=type==='mvt'?S.mvt:S.hd;
  var p=null; for(var i=0;i<items.length;i++){if(items[i]._uid===euid){p=items[i];break;}}
  if(!p) return;
  document.getElementById('eu').value=euid;
  document.getElementById('etype').value=type;
  document.getElementById('et').textContent='Modifier \u2014 '+p.calibre;
  document.getElementById('es').textContent=p.id+' \u2022 Les modifications seront archivees.';
  var map=[['ec','calibre'],['erm','rm'],['efreq','freq'],['eangle','angle'],['egain','gain'],
           ['ert','remTige'],['era','remAuto'],['esp','stabPost'],['esi','stabInter'],['etm','tMesure'],['eiso','isochr']];
  for(var i=0;i<map.length;i++){var el=document.getElementById(map[i][0]);if(el)el.value=p[map[i][1]]||'';}
  document.getElementById('eop').value='';
  document.getElementById('echamp').value='';
  document.getElementById('emotif').value='';
  document.getElementById('mo-edit').classList.add('open');
}

function saveEdit(){
  var euid=gv('eu'),type=gv('etype'),op=gv('eop'),motif=gv('emotif'),champ=gv('echamp');
  if(!op){toast('Operateur requis','e');return;}
  if(!motif){toast('Motif requis','e');return;}
  var items=type==='mvt'?S.mvt:S.hd;
  var p=null; for(var i=0;i<items.length;i++){if(items[i]._uid===euid){p=items[i];break;}}
  if(!p) return;
  var map=[['ec','calibre'],['erm','rm'],['efreq','freq'],['eangle','angle'],['egain','gain'],
           ['ert','remTige'],['era','remAuto'],['esp','stabPost'],['esi','stabInter'],['etm','tMesure'],['eiso','isochr']];
  for(var i=0;i<map.length;i++){p[map[i][1]]=gv(map[i][0]);}
  var t=tsNow(); p.lastMod=t; p.lastOp=op;
  logHist({date:t,type:'modif',progId:p.id,calibre:p.calibre,operateur:op,motif:motif,champ:champ||null});
  save(); closeMo('mo-edit'); renderList(type); toast('Modification enregistree');
}

function openAdd(){
  var ids=['aid','acal','arm','afreq','aangle','again','art','ara','asp','asi','atm','aiso','aop'];
  for(var i=0;i<ids.length;i++){var el=document.getElementById(ids[i]);if(el)el.value='';}
  document.getElementById('mo-add').classList.add('open');
}

function saveAdd(){
  var type=gv('at'),id=gv('aid'),calibre=gv('acal'),op=gv('aop');
  if(!id||!calibre||!op){toast('ID, calibre et operateur requis','e');return;}
  var t=tsNow();
  var p={_uid:genUid(),id:id,calibre:calibre,T0:{},T24:{},
    rm:gv('arm'),freq:gv('afreq'),angle:gv('aangle'),gain:gv('again'),
    remTige:gv('art'),remAuto:gv('ara'),stabPost:gv('asp'),stabInter:gv('asi'),
    tMesure:gv('atm'),isochr:gv('aiso'),label0h:'0h',label24h:'24h',
    lastMod:t,lastOp:op};
  if(type==='mvt') S.mvt.push(p); else S.hd.push(p);
  logHist({date:t,type:'ajout',progId:id,calibre:calibre,operateur:op,motif:'Programme cree',champ:null});
  save(); updateBadges(); closeMo('mo-add');
  nav(type==='mvt'?'mvt':'hd'); toast('Programme '+id+' cree');
}

function save(){
  try{
    localStorage.setItem('s_hist',JSON.stringify(S.hist));
  }catch(e){}
}

window.onload = function() {
  // Toujours charger les donnees embarquees
  S.mvt = EMBEDDED.mouvements;
  S.hd  = EMBEDDED.heads;
  try{var hi=localStorage.getItem('s_hist');S.hist=hi?JSON.parse(hi):[];}catch(e){S.hist=[];}
  updateBadges();
  renderList('mvt');
  document.querySelectorAll('.mo').forEach(function(o){
    o.addEventListener('click',function(ev){if(ev.target===o)o.classList.remove('open');});
  });
};

</script>
</body>
